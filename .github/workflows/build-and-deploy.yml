name: Deploy documentation website

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate version page
        run: |
          if [ -f scripts/generate_version_page.py ]; then
            python scripts/generate_version_page.py
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build MkDocs website
        run: |
          mkdocs build --clean --site-dir site

      - name: Verify website
        run: |
          if [ ! -f site/index.html ]; then
            echo "Error: site/index.html was not generated"
            exit 1
          fi

          echo "Generated website files:"
          find site -maxdepth 2 -type f | head -30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy website
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4